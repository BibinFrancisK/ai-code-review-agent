name: Deploy to AWS (CDK)

on:
  workflow_run:
    workflows: ["Publish Docker Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      - name: CDK Bootstrap
        working-directory: cdk
        run: cdk bootstrap

      - name: CDK Deploy
        working-directory: cdk
        run: |
          cdk deploy --require-approval never \
            --context dockerhubUsername=${{ secrets.DOCKERHUB_USERNAME }}

      - name: Get EC2 instance ID
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stack-resource \
            --stack-name AiCodeReviewerStack \
            --logical-resource-id AppInstance \
            --query StackResourceDetail.PhysicalResourceId \
            --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Redeploy app via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["/usr/local/bin/redeploy.sh"]' \
            --comment "Redeploy after image push" \
            --query Command.CommandId --output text)
          echo "SSM command ID: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
