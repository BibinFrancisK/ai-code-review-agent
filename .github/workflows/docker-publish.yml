name: Publish Docker Image

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-code-reviewer:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-code-reviewer:sha-${{ env.SHORT_SHA }}

      - name: Prune old SHA tags (keep last 4)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          TOKEN=$(curl -sf -X POST https://hub.docker.com/v2/users/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$DOCKERHUB_USERNAME\",\"password\":\"$DOCKERHUB_TOKEN\"}" \
            | jq -r .token)
          echo "::add-mask::$TOKEN"

          REPO="$DOCKERHUB_USERNAME/ai-code-reviewer"

          curl -sf "https://hub.docker.com/v2/repositories/${REPO}/tags/?page_size=100" \
            -H "Authorization: Bearer $TOKEN" \
            | jq -r '.results
                     | map(select(.name | startswith("sha-")))
                     | sort_by(.last_updated) | reverse
                     | .[4:] | .[].name' \
            | while read -r tag; do
                echo "Deleting old tag: $tag"
                curl -sf -X DELETE \
                  "https://hub.docker.com/v2/repositories/${REPO}/tags/${tag}/" \
                  -H "Authorization: Bearer $TOKEN"
              done
